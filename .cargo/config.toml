# Use `clang` as the linker instead of cargo's default `cc`.
#
# Why: on this machine a `claude-code` Docker launcher script is installed as
# `~/.local/bin/cc` and shadows the real C compiler on PATH. cargo's default
# linker driver is `cc`, so it invokes the launcher (which needs a TTY) and the
# link step fails. `clang` is not shadowed and is the standard macOS compiler,
# so this is portable - no absolute paths, harmless on machines without the shim.
#
# Root-cause fix (not done here, it's outside this repo): rename the launcher to
# something non-colliding, e.g. `claude-docker`, and this override becomes moot.
[target.aarch64-apple-darwin]
linker = "clang"
