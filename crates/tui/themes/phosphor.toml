# Phosphor - the amber CRT, taken literally.
#
# One hue, five intensities, no exceptions: every distinction the other themes make
# with color, this one makes with brightness. The only escalation available is
# inverse video, which is what those terminals actually did - so the bars, the
# selection and the secondary carets are all the same move at different scales.

text             = { fg = "#ffb000", bg = "#150f06" }
head_bar         = { fg = "#150f06", bg = "#ffb000", bold = true }
status_bar       = { fg = "#150f06", bg = "#c48700" }
gutter           = { fg = "#7a5200" }
gutter_current   = { fg = "#ffd980", bold = true }
selection        = { fg = "#150f06", bg = "#ffb000" }
current_line     = { bg = "#20180a" }
secondary_cursor = { reversed = true }
toast_info       = { fg = "#150f06", bg = "#c48700" }
toast_error      = { fg = "#150f06", bg = "#ffd980", bold = true }
palette          = { fg = "#ffb000", bg = "#150f06" }
palette_selected = { fg = "#150f06", bg = "#ffb000", bold = true }

# One hue, so diagnostics separate by intensity like everything else: a bright
# amber error down to a dim hint. The underline shape does the rest.
diagnostic_error       = { fg = "#ffd980" }
diagnostic_warning     = { fg = "#ffb000" }
diagnostic_information = { fg = "#c48700" }
diagnostic_hint        = { fg = "#7a5200" }

# One hue, so syntax separates by intensity like everything else: brightest amber
# for keywords, the base amber for identifiers, dimmer for strings and constants,
# and the faintest for comments. No second color ever - this is a monochrome tube.
syntax_keyword     = { fg = "#ffd980" }
syntax_function    = { fg = "#ffc94d" }
syntax_type        = { fg = "#ffc94d" }
syntax_string      = { fg = "#c48700" }
syntax_comment     = { fg = "#7a5200", italic = true }
syntax_constant    = { fg = "#ffd980" }
syntax_variable    = { fg = "#ffb000" }
syntax_punctuation = { fg = "#c48700" }
