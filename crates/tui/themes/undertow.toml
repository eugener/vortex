# Undertow - the house dark theme, and the default (SPEC §10.5).
#
# Discipline: depth is carried by blue (each surface that comes forward gets a
# lighter, bluer ground), state is carried by the accent #63d2c3 - which is spent
# only on "you are here", never on ordinary chrome.

text             = { fg = "#ccd2e4", bg = "#151823" }
head_bar         = { fg = "#ccd2e4", bg = "#11141d", bold = true }
status_bar       = { fg = "#8a93b5", bg = "#11141d" }
gutter           = { fg = "#4a5273" }
gutter_current   = { fg = "#ccd2e4", bold = true }
selection        = { fg = "#eef1fa", bg = "#2b3557" }
current_line     = { bg = "#1c2031" }
secondary_cursor = { fg = "#151823", bg = "#7d6ce0" }
toast_info       = { fg = "#ccd2e4", bg = "#22283c" }
toast_error      = { fg = "#ffe7ec", bg = "#7a2f3d", bold = true }
palette          = { fg = "#ccd2e4", bg = "#1a1e2c" }
palette_selected = { fg = "#eef1fa", bg = "#2b3557", bold = true }

# Diagnostics (SPEC §5): red error and amber warning carry the signal; info and
# hint stay quiet so a wall of hints never shouts over a real error.
diagnostic_error       = { fg = "#e06c75" }
diagnostic_warning     = { fg = "#d69d53" }
diagnostic_information = { fg = "#619ad6" }
diagnostic_hint        = { fg = "#7d86a8" }

# Syntax (SPEC §5, M4): a restrained scheme on the blue ground - violet keyword,
# blue function, warm-gold type, green string, dim-italic comment, orange constant,
# body-colored variable so ordinary identifiers stay calm, and a muted punctuation.
syntax_keyword     = { fg = "#b18be0" }
syntax_function    = { fg = "#619ad6" }
syntax_type        = { fg = "#d6b270" }
syntax_string      = { fg = "#8cc265" }
syntax_comment     = { fg = "#5a6382", italic = true }
syntax_constant    = { fg = "#d69d53" }
syntax_variable    = { fg = "#ccd2e4" }
syntax_punctuation = { fg = "#8a93b5" }
